<!doctype html>
<html lang="zh">
<head><meta charset="utf-8"><title>EnvMark Custom Fields Test</title></head>
<body>
  <h2>测试登录</h2>
  <form id="loginForm" action="/login" method="post">
    <label>商户号 <input name="merchantId" placeholder="请输入商户号" autocomplete="off"></label><br><br>
    <label>用户名 <input name="username" type="text" placeholder="用户名"></label><br><br>
    <label>密码 <input name="password" type="password" placeholder="密码"></label><br><br>
    <button type="submit">登录</button>
  </form>
</body>
</html>
